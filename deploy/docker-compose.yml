services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: papermate
      POSTGRES_USER: papermate
      POSTGRES_PASSWORD: papermate
    volumes:
      - papermate_pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U papermate -d papermate"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ../backend
      dockerfile: ../deploy/Dockerfile.backend
    env_file:
      - ../backend/.env
    environment:
      PAPERMATE_ENV: prod
      PAPERMATE_DATABASE_URL: postgresql+psycopg://papermate:papermate@db:5432/papermate
      PAPERMATE_CORS_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      PAPERMATE_ENABLE_DOCS: "false"
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    image: nginx:1.27-alpine
    volumes:
      - ../UIPrototype/frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    depends_on:
      - api

volumes:
  papermate_pg:
