<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PaperMate 前端原型</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="toast" class="toast" aria-live="polite"></div>

  <section id="auth-view" class="auth-view">
    <div class="auth-card">
      <div class="brand-block">
        <div class="brand-logo">PM</div>
        <div>
          <h1>PaperMate</h1>
          <p>面向 arXiv 论文的智能阅读工作台</p>
        </div>
      </div>

      <div class="auth-tabs" role="tablist">
        <button class="auth-tab active" data-auth-panel="login">登录</button>
        <button class="auth-tab" data-auth-panel="register">注册</button>
      </div>

      <div id="login-panel" class="auth-panel active">
        <label>账号 / 邮箱</label>
        <input id="login-email" type="text" placeholder="任意账号可登录，输入 admin 进入管理员演示" />
        <label>密码</label>
        <input id="login-password" type="password" placeholder="原型阶段无需真实校验" />
        <button class="btn primary full" data-action="login">进入系统</button>
        <p class="hint">当前版本不绑定后端，不读写数据库；登录按钮仅切换到前端演示界面。</p>
      </div>

      <div id="register-panel" class="auth-panel">
        <label>邮箱</label>
        <input id="register-email" type="text" placeholder="example@school.edu" />
        <label>密码</label>
        <input id="register-password" type="password" placeholder="设置密码" />
        <button class="btn primary full" data-action="register">注册并进入引导</button>
        <p class="hint">注册后展示首次画像引导，不会真正创建账号。</p>
      </div>
    </div>

    <div class="auth-preview">
      <span class="eyebrow">Prototype First</span>
      <h2>先把页面流程跑通，再逐步替换为真实接口</h2>
      <p>这个版本把页面渲染、状态切换、Mock 数据和将来的接口入口分开，后端接入时可以从 app.js 的 mockApi 开始替换。</p>
      <div class="preview-grid">
        <div><strong>6</strong><span>核心页面</span></div>
        <div><strong>0</strong><span>后端依赖</span></div>
        <div><strong>1</strong><span>Mock API 层</span></div>
      </div>
    </div>
  </section>

  <div id="app-view" class="app-view hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-logo small">PM</div>
        <div>
          <strong>PaperMate</strong>
          <span>前端原型</span>
        </div>
      </div>
      <nav id="main-nav" class="nav-list"></nav>
      <div class="sidebar-footer">
        <div class="user-chip" id="user-chip"></div>
        <button class="btn ghost full" data-action="logout">退出登录</button>
      </div>
    </aside>

    <main class="main-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow" id="page-eyebrow">Prototype</p>
          <h2 id="page-title">工作台</h2>
        </div>
        <div class="topbar-actions">
          <button class="btn soft" data-action="quick-search">快速检索</button>
          <button class="btn primary" data-route="search">新建论文检索</button>
        </div>
      </header>

      <section id="page-root" class="page-root"></section>
    </main>
  </div>

  <div id="modal-root" class="modal-root hidden"></div>

  <script src="app.js"></script>
</body>
</html>
